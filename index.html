<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RbxVault — Top Up Robux Indonesia</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#e8c96d;--gold2:#f5e0a0;--gold-dim:#8a6e2f;
  --fire:#ff6b35;--fire2:#ff9a5c;
  --bg:#04030a;--bg2:#080612;--bg3:#0d0a1a;
  --surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.06);
  --border:rgba(232,201,109,0.12);--border2:rgba(232,201,109,0.25);
  --text:#f0eaff;--muted:#6e6888;
  --green:#4ade80;--red:#f87171;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:default}

/* ── EPIC BACKGROUND ── */
.world-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(232,201,109,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 80% 80% at 0% 50%, rgba(120,60,200,0.12) 0%, transparent 50%),
    radial-gradient(ellipse 60% 60% at 100% 70%, rgba(255,107,53,0.08) 0%, transparent 50%);
}
.stars-layer{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 15% 22%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 32% 67%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 54% 14%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 71% 43%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 81%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 6% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 44% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 12%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 25% 45%, rgba(232,201,109,0.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 28%, rgba(232,201,109,0.4) 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 90%, rgba(255,107,53,0.4) 0%, transparent 100%);
}

/* ── TOAST ── */
#toast-wrap{position:fixed;bottom:24px;left:24px;z-index:900;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:10px;
  background:rgba(8,6,18,0.95);border:1px solid var(--border2);
  backdrop-filter:blur(20px);border-radius:10px;
  padding:11px 14px;min-width:250px;max-width:300px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6),0 0 0 1px rgba(232,201,109,0.05);
  animation:tIn .35s cubic-bezier(.34,1.56,.64,1) both;pointer-events:auto;
}
.toast.out{animation:tOut .25s ease forwards}
.t-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;color:#fff;flex-shrink:0;border:1px solid rgba(232,201,109,0.2)}
.t-body .t-main{font-size:.78rem;font-weight:600;line-height:1.3;color:var(--text)}
.t-body .t-main span{color:var(--gold);font-weight:700}
.t-body .t-sub{font-size:.68rem;color:var(--muted);margin-top:2px}
.t-gem{font-size:1rem;flex-shrink:0}
@keyframes tIn{from{opacity:0;transform:translateX(-16px) scale(.92)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes tOut{to{opacity:0;transform:translateX(-16px) scale(.92)}}

/* ── RUNE DIVIDER ── */
.rune-div{
  display:flex;align-items:center;gap:12px;
  color:var(--gold-dim);font-size:.65rem;letter-spacing:4px;text-transform:uppercase;
  margin:0 auto;max-width:400px;text-align:center;
}
.rune-div::before,.rune-div::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}

/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:60px;
  background:rgba(4,3,10,0.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:'Cinzel',serif;font-size:1.25rem;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--fire2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;
}
nav ul{list-style:none;display:flex;gap:32px}
nav ul a{
  font-family:'Cinzel',serif;color:var(--muted);font-size:.72rem;font-weight:600;
  text-decoration:none;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s;
}
nav ul a:hover{color:var(--gold)}
.nav-status{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:600;color:var(--green)}
.live-orb{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse-orb 1.8s ease-in-out infinite}
@keyframes pulse-orb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.nav-btn{
  font-family:'Cinzel',serif;
  background:linear-gradient(135deg,#3d2800,#6b4200);
  color:var(--gold);padding:8px 22px;border-radius:6px;
  font-size:.7rem;font-weight:700;letter-spacing:2px;
  text-decoration:none;text-transform:uppercase;
  border:1px solid var(--gold-dim);
  box-shadow:0 0 16px rgba(232,201,109,0.15),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all .2s;
}
.nav-btn:hover{box-shadow:0 0 28px rgba(232,201,109,0.3);border-color:var(--gold)}

/* ── LIVE BAR ── */
.live-bar{
  position:relative;z-index:1;
  background:linear-gradient(90deg,rgba(232,201,109,0.04),rgba(232,201,109,0.08),rgba(232,201,109,0.04));
  border-bottom:1px solid var(--border);
  padding:9px 48px;display:flex;align-items:center;gap:36px;flex-wrap:wrap;overflow:hidden;
}
.live-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.lb{display:flex;align-items:center;gap:8px;font-size:.75rem;font-weight:500}
.lb-icon{font-size:.9rem}
.lb strong{color:var(--gold);font-weight:700}
.lb span{color:var(--muted)}
.lb-sep{color:var(--border2);font-size:1.2rem}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  min-height:90vh;display:grid;grid-template-columns:1fr 400px;gap:48px;
  max-width:1240px;margin:0 auto;padding:80px 48px 60px;align-items:center;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--border2);
  background:rgba(232,201,109,0.05);
  color:var(--gold);font-size:.68rem;font-weight:600;letter-spacing:3px;
  text-transform:uppercase;padding:6px 16px;border-radius:100px;
  margin-bottom:28px;
  animation:riseUp .6s ease both;
}
.hero h1{
  font-family:'Cinzel',serif;
  font-size:clamp(2.8rem,5.5vw,4.8rem);
  font-weight:900;line-height:1;letter-spacing:-1px;
  animation:riseUp .6s .1s ease both;
}
.hero h1 .shimmer{
  background:linear-gradient(135deg,var(--gold),var(--gold2),#fff,var(--gold));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 4s linear infinite;
}
@keyframes shimmer{to{background-position:200% center}}
.hero-sub{
  margin-top:20px;color:var(--muted);font-size:.95rem;line-height:1.75;
  max-width:460px;animation:riseUp .6s .2s ease both;font-weight:400;
}
.hero-btns{display:flex;gap:12px;margin-top:32px;animation:riseUp .6s .3s ease both}
.btn-gold{
  font-family:'Cinzel',serif;
  background:linear-gradient(135deg,#5c3a00,#9a6000,#c88000);
  color:var(--gold2);padding:13px 30px;border-radius:8px;
  font-size:.8rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;border:1px solid var(--gold-dim);
  box-shadow:0 4px 24px rgba(232,201,109,0.25),inset 0 1px 0 rgba(255,255,255,0.15);
  transition:all .2s;
}
.btn-gold:hover{box-shadow:0 8px 36px rgba(232,201,109,0.4);transform:translateY(-2px)}
.btn-ghost{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:13px 30px;border-radius:8px;
  font-size:.85rem;font-weight:500;text-decoration:none;transition:all .2s;
}
.btn-ghost:hover{border-color:var(--border2);background:rgba(255,255,255,0.08)}

.hero-trust{display:flex;gap:20px;margin-top:32px;flex-wrap:wrap;animation:riseUp .6s .4s ease both}
.ht{display:flex;align-items:center;gap:7px;font-size:.75rem;color:var(--muted);font-weight:500}
.ht-icon{font-size:.95rem}

/* ── ACTIVITY CARD ── */
.activity-card{
  position:relative;z-index:1;
  background:rgba(13,10,26,0.8);
  border:1px solid var(--border);border-radius:16px;
  overflow:hidden;
  animation:riseUp .6s .3s ease both;
  backdrop-filter:blur(12px);
}
.activity-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.ac-head{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.ac-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;font-weight:600}
.ac-live{display:flex;align-items:center;gap:6px;font-size:.68rem;font-weight:600;color:var(--green)}
.feed{display:flex;flex-direction:column;max-height:320px;overflow:hidden;padding:8px 0}
.fi{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  transition:background .2s;
}
.fi:hover{background:rgba(255,255,255,0.02)}
.fi-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.68rem;color:#fff;flex-shrink:0;border:1px solid rgba(232,201,109,0.15)}
.fi-info{flex:1;min-width:0}
.fi-name{font-size:.77rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-detail{font-size:.68rem;color:var(--muted);margin-top:1px}
.fi-detail b{color:var(--gold);font-weight:700}
.fi-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.fi-time{font-size:.62rem;color:var(--muted)}
.fi-badge{font-size:.58rem;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.badge-new{background:rgba(74,222,128,0.12);color:var(--green);border:1px solid rgba(74,222,128,0.2)}
.badge-legendary{background:rgba(232,201,109,0.12);color:var(--gold);border:1px solid var(--border2)}
.ac-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ac-foot-total{font-size:.75rem;color:var(--muted)}
.ac-foot-total strong{color:var(--gold);font-weight:700}

/* ── SECTION WRAPPER ── */
.sec{position:relative;z-index:1;padding:80px 48px;max-width:1240px;margin:0 auto}
.sec-center{text-align:center;margin-bottom:52px}
.sec-kicker{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px}
.sec-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;letter-spacing:-0.5px;line-height:1.1}
.sec-sub{color:var(--muted);font-size:.9rem;margin-top:10px;line-height:1.7}

/* ── PACKAGES ── */
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}

.pkg{
  position:relative;overflow:hidden;
  background:rgba(13,10,26,0.6);
  border:1px solid var(--border);border-radius:16px;
  padding:32px 24px;text-align:center;
  backdrop-filter:blur(12px);
  transition:transform .3s,box-shadow .3s,border-color .3s;
  cursor:pointer;
}
.pkg::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);transition:opacity .3s}
.pkg:hover{transform:translateY(-6px);box-shadow:0 24px 60px rgba(0,0,0,0.5),0 0 40px rgba(232,201,109,0.08);border-color:var(--border2)}
.pkg.legendary{border-color:var(--gold-dim);box-shadow:0 0 30px rgba(232,201,109,0.1)}
.pkg.legendary::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:1}
.pkg.legendary::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at top,rgba(232,201,109,0.06) 0%,transparent 60%);
  pointer-events:none;
}

/* tier badge */
.tier-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;padding:4px 12px;border-radius:100px;margin-bottom:20px;
}
.tier-common{background:rgba(107,107,136,0.15);color:var(--muted);border:1px solid rgba(107,107,136,0.2)}
.tier-rare{background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.2)}
.tier-legendary{background:rgba(232,201,109,0.12);color:var(--gold);border:1px solid var(--border2)}

.pkg-icon{font-size:2.6rem;margin-bottom:12px;display:block}
.pkg-amount{font-family:'Cinzel',serif;font-size:2.8rem;font-weight:900;color:var(--gold);letter-spacing:-1px;line-height:1}
.pkg-unit{font-size:.72rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:20px;margin-top:2px}

.pkg-price-box{
  background:rgba(232,201,109,0.04);border:1px solid var(--border);
  border-radius:10px;padding:16px;margin-bottom:20px;
}
.pkg-price{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--text);line-height:1}
.pkg-per{font-size:.68rem;color:var(--muted);margin-top:4px;font-weight:500}

.pkg-buyers{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;font-size:.72rem;color:var(--muted);font-weight:500}
.mini-avatars{display:flex}
.mini-av{width:20px;height:20px;border-radius:50%;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;color:#fff;margin-right:-6px}

.pkg-perks{list-style:none;margin-bottom:24px;display:flex;flex-direction:column;gap:7px;text-align:left}
.pkg-perks li{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.pkg-perks li .ck{color:var(--gold);font-size:.7rem}

.pkg-cta{
  display:block;width:100%;
  font-family:'Cinzel',serif;
  background:rgba(232,201,109,0.08);border:1px solid var(--border2);
  color:var(--gold);padding:11px;border-radius:8px;
  font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;font-family:'Cinzel',serif;
}
.pkg-cta:hover,.pkg.legendary .pkg-cta{
  background:linear-gradient(135deg,#5c3a00,#9a6000);
  color:var(--gold2);border-color:var(--gold-dim);
  box-shadow:0 4px 20px rgba(232,201,109,0.2);
}

/* heat tag */
.heat-tag{
  position:absolute;top:14px;right:14px;
  font-size:.6rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;
  background:rgba(255,107,53,0.15);color:var(--fire2);
  border:1px solid rgba(255,107,53,0.2);
}

/* ── HOW TO ── */
.how-section{
  position:relative;z-index:1;
  background:rgba(8,6,18,0.8);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:80px 48px;
}
.how-inner{max-width:1100px;margin:0 auto}
.how-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;
  border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:52px;
}
.how-step{
  padding:36px 28px;border-right:1px solid var(--border);
  position:relative;
  transition:background .25s;
}
.how-step:last-child{border-right:none}
.how-step:hover{background:rgba(232,201,109,0.04)}
.how-n{font-family:'Cinzel',serif;font-size:3rem;font-weight:900;color:rgba(232,201,109,0.1);line-height:1;margin-bottom:14px}
.how-ic{font-size:1.8rem;margin-bottom:14px;display:block}
.how-step h3{font-family:'Cinzel',serif;font-size:.85rem;font-weight:700;letter-spacing:.5px;margin-bottom:8px;color:var(--gold)}
.how-step p{font-size:.8rem;color:var(--muted);line-height:1.65}

/* ── PAYMENT ── */
.pay-section{
  position:relative;z-index:1;
  padding:32px 48px;
  background:linear-gradient(90deg,rgba(232,201,109,0.03),rgba(232,201,109,0.06),rgba(232,201,109,0.03));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:32px;flex-wrap:wrap;
}
.pay-label{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dim);font-weight:600;white-space:nowrap}
.pay-methods{display:flex;gap:10px;flex-wrap:wrap}
.pm{
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  color:var(--muted);font-size:.68rem;font-weight:700;letter-spacing:1px;
  padding:5px 12px;border-radius:6px;transition:all .2s;
}
.pm:hover{border-color:var(--border2);color:var(--gold)}

/* ── REVIEWS ── */
.reviews-section{
  position:relative;z-index:1;padding:80px 48px;
  max-width:1100px;margin:0 auto;
}
.rv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:52px}
.rc{
  background:rgba(13,10,26,0.6);border:1px solid var(--border);
  border-radius:14px;padding:24px;
  backdrop-filter:blur(8px);
  transition:transform .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.rc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.rc:hover{transform:translateY(-4px);border-color:var(--border2)}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.rc-user{display:flex;align-items:center;gap:10px}
.rc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;border:1px solid rgba(232,201,109,0.15)}
.rc-name{font-size:.85rem;font-weight:700}
.rc-handle{font-size:.7rem;color:var(--muted);margin-top:1px}
.rc-stars{color:var(--gold);font-size:.82rem;letter-spacing:2px}
.rc-text{font-size:.83rem;color:#9090b0;line-height:1.7;margin-bottom:16px;font-style:italic}
.rc-footer{display:flex;justify-content:space-between;align-items:center}
.rc-pkg{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(232,201,109,0.07);border:1px solid var(--border);
  color:var(--gold);font-size:.68rem;font-weight:700;
  padding:3px 9px;border-radius:5px;
}
.rc-time{font-size:.68rem;color:var(--muted)}

/* ── FAQ ── */
.faq-section{position:relative;z-index:1;padding:80px 48px;max-width:720px;margin:0 auto}
.fq{border-bottom:1px solid var(--border);padding:18px 0}
.fq-q{
  font-size:.9rem;font-weight:600;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  user-select:none;gap:16px;
}
.fq-icon{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:rgba(232,201,109,0.08);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;color:var(--gold);
  transition:transform .3s,background .2s;
}
.fq-q.open .fq-icon{transform:rotate(45deg);background:rgba(232,201,109,0.15)}
.fq-a{font-size:.85rem;color:var(--muted);line-height:1.7;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .3s}
.fq-a.open{max-height:200px;padding-top:12px}

/* ── CTA BANNER ── */
.cta-wrap{position:relative;z-index:1;padding:0 48px 80px}
.cta-banner{
  max-width:1100px;margin:0 auto;
  border-radius:20px;padding:60px 48px;text-align:center;
